<!DOCTYPE html>
<html>
<head>
<title>Payment</title>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white text-center">

<div class="container mt-5">
    <h2>💳 Secure Payment</h2>
    <h3 class="text-success">₹{{ amount }}</h3>

    <button id="payBtn" class="btn btn-success mt-3">
        Pay Now
    </button>
</div>

<form id="paymentForm" method="POST" action="/verify_payment">
    <input type="hidden" name="razorpay_payment_id" id="payment_id">
    <input type="hidden" name="razorpay_order_id" id="order_id">
    <input type="hidden" name="razorpay_signature" id="signature">
</form>

<script>
var options = {
    "key": "rzp_test_SkwzMKt4mOE88d",
    "amount": "{{ amount * 100 }}",
    "currency": "INR",
    "name": "Smart Parking",
    "description": "Slot Booking",
    "order_id": "{{ order_id }}",

    // ✅ SUCCESS HANDLER
    "handler": function (response){
        document.getElementById("payment_id").value = response.razorpay_payment_id;
        document.getElementById("order_id").value = response.razorpay_order_id;
        document.getElementById("signature").value = response.razorpay_signature;

        document.getElementById("paymentForm").submit();
    },

    // ❌ FAILURE HANDLER
    "modal": {
        "ondismiss": function(){
            alert("❌ Payment Cancelled");
        }
    },

    "theme": {
        "color": "#3399cc"
    }
};

var rzp = new Razorpay(options);

document.getElementById('payBtn').onclick = function(e){
    rzp.open();
    e.preventDefault();
}
</script>

</body>
</html>
