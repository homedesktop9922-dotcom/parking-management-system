<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Smart Parking</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    overflow-x:hidden;
    background:
    linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.8)),
    url('https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?q=80&w=1920') center/cover no-repeat fixed;
    color:white;
}

/* Animated background glow */
body::before{
    content:'';
    position:fixed;
    width:500px;
    height:500px;
    background:#00f0ff;
    border-radius:50%;
    filter:blur(150px);
    top:-150px;
    left:-150px;
    opacity:0.2;
    animation:moveGlow 10s infinite alternate;
}

body::after{
    content:'';
    position:fixed;
    width:500px;
    height:500px;
    background:#ff00f2;
    border-radius:50%;
    filter:blur(150px);
    bottom:-150px;
    right:-150px;
    opacity:0.2;
    animation:moveGlow2 10s infinite alternate;
}

@keyframes moveGlow{
    100%{
        transform:translate(100px,80px);
    }
}

@keyframes moveGlow2{
    100%{
        transform:translate(-100px,-80px);
    }
}

/* Navbar */

.navbar{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,0.1);
    margin:15px;
    border-radius:20px;
    padding:15px 25px;
    box-shadow:0 8px 32px rgba(0,0,0,0.3);
}

.navbar-brand{
    font-size:28px;
    font-weight:700;
    color:#00e5ff !important;
}

/* Glass cards */

.card{
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.1);
    backdrop-filter:blur(18px);
    border-radius:25px;
    color:white;
    box-shadow:0 8px 32px rgba(0,0,0,0.3);
    transition:0.4s;
    overflow:hidden;
}

.card:hover{
    transform:translateY(-8px) scale(1.02);
    box-shadow:0 15px 40px rgba(0,255,255,0.25);
}

/* Buttons */

.btn{
    border:none;
    border-radius:14px;
    padding:12px 22px;
    font-weight:600;
    transition:0.3s;
}

.btn-primary{
    background:linear-gradient(45deg,#00c6ff,#0072ff);
}

.btn-success{
    background:linear-gradient(45deg,#00ff99,#00c853);
}

.btn-danger{
    background:linear-gradient(45deg,#ff416c,#ff4b2b);
}

.btn:hover{
    transform:scale(1.05);
}

/* Inputs */

input,select{
    background:rgba(255,255,255,0.08) !important;
    border:1px solid rgba(255,255,255,0.15) !important;
    color:white !important;
    border-radius:14px !important;
    padding:12px !important;
}

input::placeholder{
    color:#ddd !important;
}

/* Tables */

.table{
    overflow:hidden;
    border-radius:20px;
    background:rgba(255,255,255,0.05);
}

.table th{
    background:rgba(0,255,255,0.15);
    color:#00f0ff;
}

.table td{
    color:white;
}

.table tr:hover{
    background:rgba(255,255,255,0.05);
}

/* Dashboard stats */

.stat-card{
    text-align:center;
    padding:25px;
}

.stat-card h2{
    font-size:42px;
    font-weight:700;
}

.stat-card h5{
    opacity:0.8;
}

/* Chart containers */

.chart-box{
    padding:25px;
}

/* Map */

.map-box{
    background:rgba(255,255,255,0.08);
    border-radius:25px;
    backdrop-filter:blur(15px);
    padding:20px;
    margin-bottom:25px;
}

iframe{
    border-radius:18px;
}

/* Scrollbar */

::-webkit-scrollbar{
    width:10px;
}

::-webkit-scrollbar-thumb{
    background:#00c6ff;
    border-radius:10px;
}

/* Responsive */

@media(max-width:768px){

    .navbar-brand{
        font-size:22px;
    }

    .stat-card h2{
        font-size:30px;
    }

}

</style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">

<div class="container-fluid">

<a class="navbar-brand">
<i class="fa-solid fa-square-parking"></i>
AI Smart Parking
</a>

<div class="d-flex align-items-center gap-3">

<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/Google_Maps_2020_Icon.svg"
width="38">

<a href="/logout" class="btn btn-danger btn-sm">
<i class="fa fa-sign-out-alt"></i> Logout
</a>

</div>

</div>

</nav>

<div class="container py-4">

<!-- MAP -->
<div class="map-box shadow-lg">

<h5 class="mb-3 text-info">
<i class="fa-solid fa-location-dot"></i>
Live Parking Location
</h5>

<iframe
src="https://www.google.com/maps/embed?pb=!1m14!1m8!1m3!1d455.04814149027493!2d73.8444181!3d18.5179666!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3bc2c0799f807e37%3A0xb703ac3dc7499f07!2sPune%20Mahanagarpalika%20Vahantal!5e1!3m2!1sen!2sin!4v1775531273575!5m2!1sen!2sin"
width="100%"
height="280"
style="border:0;"
allowfullscreen=""
loading="lazy">
</iframe>

</div>

{% block content %}{% endblock %}

</div>

</body>
</html>
