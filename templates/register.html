{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center">

<div class="col-lg-5">

<div class="card p-5">

<h2 class="text-center text-info mb-4">
📝 Create Smart Parking Account
</h2>

<form method="POST">

<input
name="username"
placeholder="Username"
class="form-control mb-3"
required>

<input
name="password"
type="password"
placeholder="Password"
class="form-control mb-3"
required>

<input
name="mobile"
placeholder="10 Digit Mobile Number"
class="form-control mb-4"
required>

<button class="btn btn-primary w-100">
Send OTP
</button>

</form>

</div>

</div>

</div>

{% endblock %}
